<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策プラットフォーム</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f6f8;
}

/* ヘッダー */
header {
  background: #1a73e8;
  color: white;
  padding: 14px 16px;
  font-size: 18px;
  font-weight: bold;
}

/* テーマ */
.theme {
  padding: 14px;
  font-size: 18px;
  background: white;
  border-bottom: 1px solid #eee;
}

/* カード */
.container {
  padding: 10px;
}

.card {
  background: white;
  margin: 12px 0;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.user-post {
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 10px;
}

/* AIボックス */
.ai-box {
  background: #f0f4ff;
  padding: 10px;
  border-radius: 10px;
  font-size: 16px;
}

/* 入力 */
.post-area {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 12px;
  border-top: 1px solid #ddd;
}

textarea {
  width: 95%;
  height: 60px;
  font-size: 18px;
  padding: 10px;
}

button {
  width: 98%;
  margin-top: 8px;
  padding: 12px;
  font-size: 18px;
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 10px;
}

button:hover {
  background: #0f5bd3;
}
</style>
</head>

<body>

<header>
市民政策プラットフォーム（β：思考拡張版）
</header>

<div class="theme">
🧠 今日のテーマ：駅前公共施設の未来
</div>

<!-- 思考カード -->
<div class="container">

  <div class="card">
    <div class="user-post">
      子どもが安心して使える公共施設にしてほしい
    </div>
    <div class="ai-box">
      🧠 要約：安全性の向上ニーズ<br>
      💬 問い：どの時間帯を最優先にしますか？<br>
      🔍 視点：高齢者との共存設計
    </div>
  </div>

  <div class="card">
    <div class="user-post">
      夜でも使えるようにしてほしい
    </div>
    <div class="ai-box">
      🧠 要約：夜間利用ニーズ<br>
      💬 問い：防犯と利便性のバランスは？<br>
      🔍 視点：地域活動との連動可能性
    </div>
  </div>

</div>

<!-- 投稿 -->
<div class="post-area">
  <textarea placeholder="あなたの考えを入力してください（投稿するとAIが対話を生成します）"></textarea>
  <button onclick="alert('（デモ）AIが対話を生成します')">投稿してAIと対話</button>
</div>

</body>
</html>
