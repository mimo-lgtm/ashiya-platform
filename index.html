<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話AIプラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- イントロ -->
<div id="introScreen" class="intro">

  <h1>🏛 市民対話AIプラットフォーム</h1>

  <p>
    市民の意見をAIとの対話によって整理し、政策テーマへ変換する実証プラットフォームです。
  </p>

  <p>
    あなたの意見を政策アイデアへ育てます。未整理のままで構いません。
    AIが対話を通じて構造化します。
  </p>

  <p>
    まずはロジックツリーで他の市民の意見を確認してください。
    気になる提案を選び、自分の意見を投稿できます。
  </p>

  <button id="startBtn">ロジックツリーを見る</button>

</div>

<!-- 上部 -->
<header class="topbar">
  <div>🏛 市民対話AI</div>
  <div class="status">LIVE DEMO</div>
</header>

<div class="layout">

  <aside class="panel tree">
    <h3>政策ロジックツリー</h3>
    <div id="treeView"></div>
  </aside>

  <main class="panel center">
    <h3>市民投稿</h3>
    <div id="posts"></div>

    <div class="inputBox">
      <textarea id="input"></textarea>
      <button id="btn">AI解析</button>
    </div>
  </main>

  <aside class="panel ai">
    <h3>AI分析</h3>
    <div id="aiPanel"></div>

    <h3>政策ドラフト</h3>
    <div id="policyPanel"></div>
  </aside>

</div>

<script src="./app.js"></script>

</body>
</html>
