<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>政策OS 完全版</title>

<style>
body{margin:0;font-family:"Yu Gothic";background:#f4f6f8;}
header{background:#1a73e8;color:white;padding:18px;font-size:22px;font-weight:bold;}

nav{display:flex;gap:8px;padding:10px;background:white;overflow:auto;}
nav button{padding:10px;border:none;border-radius:8px;background:#eef5ff;cursor:pointer;}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
background:white;padding:16px;border-radius:12px;margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.node{
background:#f8fbff;
border-left:5px solid #1a73e8;
padding:10px;
margin:6px 0;
cursor:pointer;
}

.small{font-size:12px;color:#666;}

.btn{
padding:10px;width:100%;border:none;border-radius:8px;
background:#1a73e8;color:white;margin-top:8px;
}

.tag{display:inline-block;background:#1a73e8;color:white;padding:3px 8px;border-radius:12px;font-size:12px;margin-bottom:6px;}
</style>

</head>

<body>

<header>政策OS（完全UI復元版）</header>

<nav>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('dialog')">AI壁打ち</button>
<button onclick="show('pr')">Pull Requests</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('concept')">コンセプト</button>
</nav>

<!-- ================= TREE ================= -->
<div id="tree" class="page active">

<div class="card">
<h2>ロジックツリー（詳細）</h2>

<div class="node" onclick="selectTheme('教育・都市ブランド')">
① 教育・都市ブランド
<div class="small">教育・文化・都市価値の向上（芦屋ブランド戦略）</div>
</div>

<div class="node" onclick="selectTheme('市民交流')">
② 市民交流
<div class="small">世代間交流・コミュニティ形成・居場所づくり</div>
</div>

<div class="node" onclick="selectTheme('防災・レジリエンス')">
③ 防災・レジリエンス
<div class="small">災害対応・都市安全保障・BCP拠点</div>
</div>

</div>
</div>

<!-- ================= AI ================= -->
<div id="dialog" class="page">

<div class="card">

<h2>AI壁打ち</h2>

<textarea id="input" style="width:100%;height:120px;"></textarea>

<button class="btn" onclick="runAI()">AI分析</button>

<div id="result"></div>

</div>
</div>

<!-- ================= PR ================= -->
<div id="pr" class="page">

<div class="card">
<h2>Pull Requests（市民投稿一覧）</h2>
<div id="prList"></div>
</div>

</div>

<!-- ================= ANALYSIS ================= -->
<div id="analysis" class="page">

<div class="card">
<h2>分析（AI統合）</h2>

<div id="analysisView"></div>

</div>

</div>

<!-- ================= CONCEPT ================= -->
<div id="concept" class="page">

<div class="card">
<h2>コンセプト進化</h2>

<div id="conceptView"></div>

</div>

</div>

<script>

let API_KEY = ""; // ←ここに行政APIキー
let PRs = [];
let themes = {};
let currentTheme = "";

// ---------------- UI ----------------
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function selectTheme(t){
currentTheme = t;
show("dialog");
document.getElementById("input").value = t + "について意見";
}

// ---------------- AI ----------------
async function runAI(){

let text = document.getElementById("input").value;
if(!text) return;

// ===== ダミー =====
if(!API_KEY){

renderAI({
summary:"（ダミー）" + text.slice(0,40),
title:"ダミー提案：" + currentTheme,
question:"どの観点を重視しますか？",
viewpoint:"統合前の仮分類"
});
return;
}

// ===== Gemini =====
const prompt = `
JSONで返せ：

{
"summary":"",
"title":"",
"question":"",
"viewpoint":"",
"merge_hint":""
}

入力：
${text}
`;

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
}
);

const data = await res.json();

let raw = data.candidates?.[0]?.content?.parts?.[0]?.text;

let json;
try{ json = JSON.parse(raw); }
catch(e){
json = {summary:raw,title:"解析結果",question:"",viewpoint:""};
}

renderAI(json);
}

// ---------------- AI表示 ----------------
function renderAI(d){

document.getElementById("result").innerHTML = `
<div class="card">

<div class="tag">AI要約</div>
<p>${d.summary}</p>

<div class="tag">テーマ</div>
<p><b>${d.title}</b></p>

<div class="tag">問い</div>
<p>${d.question}</p>

<button class="btn" onclick="createPR('${d.title}','${d.summary}')">
PR登録
</button>

</div>
`;
}

// ---------------- PR作成 ----------------
function createPR(title,text){

let pr = {
id:Date.now(),
title,
text,
status:"pending",
vote:0,
cluster:"未整理"
};

PRs.push(pr);

updatePR();
updateAnalysis();
updateConcept();
}

// ---------------- PR表示（完全UI） ----------------
function updatePR(){

let html="";

PRs.forEach(p=>{

html += `
<div class="node">

<b>${p.title}</b><br>
${p.text}<br><br>

状態：${p.status}<br>
投票：${p.vote}<br>
分類：${p.cluster}<br>

<button onclick="vote(${p.id})">投票</button>
<button onclick="approve(${p.id})">承認</button>

</div>
`;
});

document.getElementById("prList").innerHTML =
html || "<div class='node'>PRなし</div>";
}

// ---------------- 投票＋クラスタリング ----------------
function vote(id){

let p = PRs.find(x=>x.id===id);
p.vote++;

if(p.text.includes("教育")) p.cluster="教育統合";
else if(p.text.includes("防災")) p.cluster="防災統合";
else p.cluster="新規候補";

updatePR();
updateAnalysis();
}

// ---------------- 承認 ----------------
function approve(id){

let p = PRs.find(x=>x.id===id);
p.status="approved";

themes[p.title]=(themes[p.title]||0)+1;

updatePR();
updateAnalysis();
updateConcept();
}

// ---------------- 分析（完全復元） ----------------
function updateAnalysis(){

let clusters = {};

PRs.forEach(p=>{
clusters[p.cluster]=(clusters[p.cluster]||0)+1;
});

let html="<h3>クラスタ分析</h3>";

for(let c in clusters){
html += `<div class="node">${c}：${clusters[c]}件</div>`;
}

html += `
<h3>新規テーマ候補</h3>
<div class="node">AI共創都市モデル</div>
<div class="node">教育×都市ブランド統合</div>
<div class="node">レジリエンス都市設計</div>
`;

document.getElementById("analysisView").innerHTML = html;
}

// ---------------- コンセプト進化 ----------------
function updateConcept(){

document.getElementById("conceptView").innerHTML = `
<div class="node">
<b>統合コンセプト</b><br><br>

・教育 × 都市ブランド → 芦屋モデル形成<br>
・市民交流 → 常時開放型コミュニティ<br>
・防災 → デュアルユース都市拠点<br><br>

<b>進化状態：</b>フェーズ2（統合開始）
</div>
`;
}

</script>

</body>
</html>
