<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>市民政策AIプラットフォーム</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">🏛 市民政策AIプラットフォーム</div>

  <nav>
    <button onclick="showPage('intro')">ホーム</button>
    <button onclick="showPage('assistant')">AIアシスタント</button>
    <button onclick="showPage('analysis')">分析</button>
    <button onclick="showPage('vision')">ビジョン</button>
  </nav>
</header>

<main>

<!-- INTRO -->
<section id="intro" class="page active">
  <h1>市民とAIの共創プラットフォーム</h1>
  <div class="card">
    思いついたアイデアを入力してください。AIが整理し政策化します。
  </div>
</section>

<!-- AI ASSISTANT -->
<section id="assistant" class="page">

  <h1>🤖 AIアシスタント</h1>

  <div class="grid">

    <div class="card">
      <h2>入力</h2>

      <textarea id="ideaInput" placeholder="例：駅前に図書館を作る"></textarea>

      <button onclick="submitIdea()">投稿（AI要約＋送信）</button>
    </div>

    <div class="card">
      <h2>AI結果</h2>
      <div id="aiResult">ここにAI要約が表示されます</div>
    </div>

  </div>

</section>

<!-- ANALYSIS -->
<section id="analysis" class="page">

  <h1>📊 投稿ダッシュボード</h1>

  <div class="card">
    <h2>投稿一覧</h2>
    <div id="data"></div>
  </div>

</section>

<!-- VISION -->
<section id="vision" class="page">

  <h1>📈 ビジョン</h1>

  <div class="card" id="tree">
    投稿データに応じて自動更新されます
  </div>

</section>

</main>

<script>

function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===== Google Form ===== */
const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/XXXXXXXX/formResponse";

const ENTRY_TITLE = "entry.111111";
const ENTRY_CATEGORY = "entry.222222";
const ENTRY_CONTENT = "entry.333333";

/* ===== カテゴリ分類 ===== */
function classify(text){

  if(text.includes("駅") || text.includes("交通")) return "インフラ";
  if(text.includes("教育") || text.includes("学校")) return "教育";
  if(text.includes("公園") || text.includes("緑")) return "環境";
  if(text.includes("AI") || text.includes("デジタル")) return "DX";

  return "一般";
}

/* ===== AI投稿 ===== */
async function submitIdea(){

  const text = document.getElementById("ideaInput").value;

  if(!text){
    alert("入力してください");
    return;
  }

  const summary = text.length > 80 ? text.slice(0,80)+"..." : text;

  document.getElementById("aiResult").innerText =
    "AI要約:\n" + summary;

  const formData = new FormData();
  formData.append(ENTRY_TITLE, summary);
  formData.append(ENTRY_CATEGORY, classify(text));
  formData.append(ENTRY_CONTENT, text);

  fetch(GOOGLE_FORM_URL, {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  document.getElementById("ideaInput").value = "";
}

/* ===== データ取得 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwcN5Wbzbp8nZSV2GMvbMpXCWe9k8C5ToBN_P57kC1Dab4VZ-ib7Uim_SPct9XBzrEujg/exec";

function dedup(data){
  const seen = new Set();
  return data.filter(d=>{
    const k = (d["タイトル"]||"") + (d["内容"]||"");
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

async function loadData(){

  const res = await fetch(API_URL);
  let data = await res.json();

  data = dedup(data);

  document.getElementById("data").innerHTML = data.map(d=>`

    <div class="card">

      <div class="title">${d["タイトル"] || d["  タイトル  "]}</div>

      <div class="cat">📂 ${d["カテゴリ"] || d["  カテゴリ  "]}</div>

      <div class="body">${d["内容"] || d["  内容  "]}</div>

    </div>

  `).join("");

  updateTree(data);
}

/* ===== ロジックツリー ===== */
function updateTree(data){

  const tree = document.getElementById("tree");

  const map = {};

  data.forEach(d=>{
    const c = d["カテゴリ"] || "一般";
    map[c] = (map[c]||0)+1;
  });

  tree.innerHTML =
    "投稿カテゴリ分布<br><br>" +
    Object.entries(map).map(([k,v])=>`${k}：${v}`).join("<br>");
}

loadData();

</script>

</body>
</html>
