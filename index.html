<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策OS（APIレス版）</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f6f8;
}

/* ヘッダー */
header {
  background: linear-gradient(90deg, #1a73e8, #0f5bd3);
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

/* レイアウト */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* パネル */
.panel {
  background: white;
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  height: 85vh;
  overflow-y: auto;
}

/* ツリーノード */
.node {
  padding: 8px;
  margin-bottom: 6px;
  border-left: 5px solid #1a73e8;
  background: #f9f9f9;
  cursor: pointer;
  border-radius: 6px;
}

.node:hover {
  background: #eef5ff;
}

/* 投稿 */
.post {
  background: #f4f6ff;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* スコア表示 */
.badge {
  font-size: 12px;
  color: #555;
}

/* 入力 */
textarea {
  width: 100%;
  height: 80px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
市民政策OS（APIレス・完全デモ版）
</header>

<div class="container">

<!-- ■ 左：政策ツリー -->
<div class="panel">
<h3>政策ツリー（クリックでフィルタ）</h3>

<div class="node" onclick="filter('教育')">教育・文化</div>
<div class="node" onclick="filter('都市')">都市・環境</div>
<div class="node" onclick="filter('交流')">交流・ウェルビーイング</div>
<div class="node" onclick="filter('財政')">財政・収益</div>
<div class="node" onclick="filter('ガバナンス')">ガバナンス</div>

<hr>

<div class="node" onclick="generateAITree()">
＋ AI風ツリー生成
</div>

<pre id="aiTree" style="font-size:12px;"></pre>

</div>

<!-- ■ 中：市民投稿 -->
<div class="panel">
<h3>市民投稿</h3>

<div id="filterLabel">全件表示</div>

<textarea id="input" placeholder="例：駅前に図書館とカフェ"></textarea>
<button onclick="addPost()">投稿</button>

<div id="postList"></div>

</div>

<!-- ■ 右：行政ダッシュボード -->
<div class="panel">
<h3>行政ダッシュボード</h3>

<div id="dashboard"></div>

</div>

</div>

<script>

let posts = [];
let currentFilter = null;

/* ■ 自動分類（APIなしAIの代替） */
function classify(text){
  if(text.includes("図書館")||text.includes("教育")) return "教育";
  if(text.includes("公園")||text.includes("駅")) return "都市";
  if(text.includes("カフェ")||text.includes("交流")) return "交流";
  if(text.includes("税")||text.includes("収益")) return "財政";
  return "ガバナンス";
}

/* ■ スコア（擬似政策優先度） */
function score(text){
  let s = 50;
  if(text.includes("駅")) s += 10;
  if(text.includes("人口")) s += 20;
  if(text.includes("子ども")) s += 15;
  return Math.min(100, s);
}

/* ■ 投稿 */
function addPost(){

  let text = document.getElementById("input").value;
  if(!text) return;

  let p = {
    text: text,
    tag: classify(text),
    score: score(text)
  };

  posts.push(p);
  document.getElementById("input").value = "";

  render();
}

/* ■ フィルタ（ツリークリック） */
function filter(tag){
  currentFilter = tag;
  render();
}

/* ■ AI風ツリー生成（完全擬似） */
function generateAITree(){

  let base = [
    "教育都市モデル強化",
    "駅前再開発と滞留空間",
    "高齢者×子ども共生設計",
    "財政自立型施設モデル",
    "市民DAO型意思決定"
  ];

  document.getElementById("aiTree").innerText =
    "■ 自動生成ツリー（擬似AI）\n\n" +
    base.map(b => "・" + b).join("\n");
}

/* ■ ダッシュボード */
function renderDashboard(){

  let stats = {};

  posts.forEach(p=>{
    stats[p.tag] = (stats[p.tag]||0)+1;
  });

  let html = "";

  for(let k in stats){
    html += `<div><b>${k}</b>：${stats[k]}件</div>`;
  }

  let avg = posts.length
    ? Math.round(posts.reduce((a,b)=>a+b.score,0)/posts.length)
    : 0;

  html += `<hr><div>平均政策優先度：${avg}</div>`;

  document.getElementById("dashboard").innerHTML = html;
}

/* ■ 投稿表示 */
function renderPosts(){

  let list = posts;

  if(currentFilter){
    list = posts.filter(p=>p.tag===currentFilter);
    document.getElementById("filterLabel").innerText =
      "フィルタ：" + currentFilter;
  } else {
    document.getElementById("filterLabel").innerText =
      "全件表示";
  }

  document.getElementById("postList").innerHTML =
    list.map(p=>
      `<div class="post">
        <div class="badge">[${p.tag}] score:${p.score}</div>
        ${p.text}
      </div>`
    ).join("");
}

/* ■ 全体描画 */
function render(){
  renderPosts();
  renderDashboard();
}

render();

</script>

</body>
</html>
