<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話AIプラットフォーム</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="thought ui.css">

<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<header>市民対話AIプラットフォーム（FINAL SYSTEM）</header>

<div class="container">

<div class="panel">
<h3>意見入力</h3>

<textarea id="input"></textarea>
<button onclick="addPost()">AI分析</button>

<div id="posts"></div>
</div>

<div class="panel">
<h3>政策ツリー</h3>

<div class="theme" onclick="filter('安全')">安全</div>
<div class="theme" onclick="filter('交流')">交流</div>
<div class="theme" onclick="filter('教育')">教育</div>
<div class="theme" onclick="filter('収益')">収益</div>
<div class="theme" onclick="filter('都市')">都市</div>

<button onclick="reset()">ALL</button>

<hr>

<h3>生成テーマ</h3>
<div id="themes"></div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
