<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策プラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- 上部ボタン -->
<div class="topbar">
  <button onclick="switchView('tree')">ロジックツリー</button>
  <button onclick="switchView('posts')">投稿</button>
  <button onclick="switchView('pr')">Pull Request</button>
  <button onclick="switchView('analysis')">分析</button>
  <button onclick="switchView('merge')">統合</button>
</div>

<!-- メイン -->
<div id="treeView" class="view">

  <pre id="treeBox" class="treeBox"></pre>

</div>

<div id="postsView" class="view hidden">

  <h3>投稿</h3>

  <div id="themeList">
    <button onclick="selectTheme('価値向上')">価値向上</button>
    <button onclick="selectTheme('市民ベネフィット')">市民ベネフィット</button>
    <button onclick="selectTheme('財政')">財政</button>
    <button onclick="selectTheme('施設')">施設</button>
    <button onclick="selectTheme('ガバナンス')">ガバナンス</button>
  </div>

  <div id="posts"></div>

  <textarea id="input"></textarea>
  <button id="btn">投稿</button>

</div>

<div id="prView" class="view hidden">
  <h3>Pull Request</h3>
</div>

<div id="analysisView" class="view hidden">
  <h3>分析</h3>
</div>

<div id="mergeView" class="view hidden">
  <h3>統合</h3>
</div>

<script src="./app.js"></script>

</body>
</html>
