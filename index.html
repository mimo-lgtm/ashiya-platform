<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市民政策AIプラットフォーム</title>

<style>
/* ====== ここはあなたのCSSそのままでOK ====== */
/* 省略せず使ってOK（今のを維持） */
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">🏛 市民政策AIプラットフォーム</div>

  <nav>
    <button onclick="showPage('intro')">ホーム</button>
    <button onclick="showPage('tree')">ロジックツリー</button>
    <button onclick="showPage('ai')">AI壁打ち</button>
    <button onclick="showPage('rules')">分析ルール</button>
    <button onclick="showPage('pr')">PULL REQUEST</button>
    <button onclick="showPage('vision')">ビジョン</button>
  </nav>
</header>

<main>

<!-- ================= INTRO ================= -->
<section id="intro" class="page active">
  <div class="placeholder-card">
    <h1>駅前公共施設について皆で考えよう</h1>
    <h2>市民政策プラットフォーム</h2>
  </div>
</section>

<!-- ================= TREE ================= -->
<section id="tree" class="page">

<h1>🌳 ロジックツリー</h1>

<div class="logic-tree">

  <div class="tree-root">政策ツリー</div>

  <div class="tree-level">

    <div class="tree-parent">
      <div class="tree-node root-node">① 価値向上</div>

      <div class="tree-children">

        <div class="tree-leaf" onclick="goAI('次世代教育ブランド')">次世代教育ブランド</div>
        <div class="tree-leaf" onclick="goAI('EdTech連携')">EdTech連携</div>
        <div class="tree-leaf" onclick="goAI('景観美化')">景観美化</div>
        <div class="tree-leaf" onclick="goAI('公園芝生化')">公園芝生化</div>

        <!-- ★ダミー（重要） -->
        <div class="tree-leaf" onclick="goAI('多世代交流')">多世代交流</div>
        <div class="tree-leaf" onclick="goAI('サードプレイス')">サードプレイス</div>
        <div class="tree-leaf" onclick="goAI('施設収益化')">施設収益化</div>
        <div class="tree-leaf" onclick="goAI('起業支援')">起業支援</div>
        <div class="tree-leaf" onclick="goAI('防災')">防災</div>

      </div>
    </div>

  </div>
</div>

</section>

<!-- ================= AI ================= -->
<section id="ai" class="page">

<h1>🤖 AI壁打ち</h1>

<div class="placeholder-card">

<textarea id="aiInput"></textarea>

<select id="aiCategory">
  <option value="value">価値向上</option>
  <option value="benefit">ベネフィット</option>
  <option value="finance">財政</option>
  <option value="strategy">戦略</option>
  <option value="resilience">強靭性</option>
</select>

<button onclick="aiRun()">AI実行</button>

</div>

<div id="aiResult" class="placeholder-card">
結果がここに表示されます
</div>

</section>

<!-- ================= PR ================= -->
<section id="pr" class="page">

<h1>📋 PULL REQUEST</h1>

<div class="pr-category">
  <button onclick="filterPR('value')">価値向上</button>
  <button onclick="filterPR('benefit')">ベネフィット</button>
  <button onclick="filterPR('finance')">財政</button>
  <button onclick="filterPR('strategy')">戦略</button>
  <button onclick="filterPR('resilience')">強靭性</button>
</div>

<div id="prList"></div>

</section>

<!-- ================= VISION ================= -->
<section id="vision" class="page">
<h1>ビジョン</h1>
<div class="placeholder-card">
現在のビジョン表示
</div>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
