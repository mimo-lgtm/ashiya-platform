<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>市民政策AIプラットフォーム</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

<div class="logo">
🏛 市民政策AIプラットフォーム
</div>

<nav>
<button onclick="showPage('intro')">ホーム</button>
<button onclick="showPage('tree')">ロジックツリー</button>
<button onclick="showPage('assistant')">AIアシスタント</button>
<button onclick="showPage('analysis')">分析・統合</button>
<button onclick="showPage('vision')">ビジョン変遷</button>
</nav>

</header>

<main>

<!-- ========================= INTRO（昨日デザイン復活） ========================= -->
<section id="intro" class="page active">

<div class="hero-comic">
<img src="images/comic-all.png" alt="">
</div>

<div class="welcome-card">

<h1>市民とAIが共創する政策形成</h1>

<p>あなたのアイデアはAIで整理され政策化されます。</p>

<div class="cta-buttons">
<button onclick="showPage('tree')">ロジックツリー</button>
<button onclick="showPage('assistant')">AIアシスタント</button>
<button onclick="showPage('analysis')">分析</button>
</div>

</div>

</section>

<!-- ========================= TREE（昨日のUI復活） ========================= -->
<section id="tree" class="page">

<h1>ロジックツリー</h1>

<div class="tree-root" id="treeRoot">
芦屋市の未来
</div>

<div class="tree-row">
<div class="tree-node">価値向上</div>
<div class="tree-node">市民ベネフィット</div>
<div class="tree-node">交流</div>
<div class="tree-node">イノベーション</div>
<div class="tree-node">運営効率</div>
</div>

<div class="placeholder-card">
市民投稿によって自動成長
</div>

</section>

<!-- ========================= ASSISTANT（機能統合） ========================= -->
<section id="assistant" class="page">

<h1>AIアシスタント</h1>

<div class="assistant-layout">

<div class="assistant-card">

<h2>入力</h2>

<textarea id="ideaInput"></textarea>

<button class="primary-btn" onclick="submitIdea()">
AI分析・投稿
</button>

</div>

<div class="assistant-card">

<h2>AI結果</h2>

<div class="result-box" id="aiResult">
ここにAI要約が表示されます
</div>

</div>

</div>

</section>

<!-- ========================= ANALYSIS（昨日UI＋機能） ========================= -->
<section id="analysis" class="page">

<h1>分析センター</h1>

<div class="metric-grid">

<div class="metric-card">価値向上</div>
<div class="metric-card">幸福</div>
<div class="metric-card">交流</div>
<div class="metric-card">イノベーション</div>
<div class="metric-card">効率</div>

</div>

<div class="placeholder-card">
<h2>市民投稿一覧</h2>
<div id="data"></div>
</div>

</section>

<!-- ========================= VISION（昨日UI復活） ========================= -->
<section id="vision" class="page">

<h1>ビジョン変遷</h1>

<div class="timeline">

<div class="timeline-item">2026 価値向上</div>
<div class="timeline-item">2027 交流</div>
<div class="timeline-item">2028 イノベーション</div>

</div>

</section>

</main>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===== Google Form ===== */
const GOOGLE_FORM_URL = "https://script.google.com/macros/s/AKfycbwcN5Wbzbp8nZSV2GMvbMpXCWe9k8C5ToBN_P57kC1Dab4VZ-ib7Uim_SPct9XBzrEujg/exec";

const ENTRY_TITLE = "entry.111111";
const ENTRY_CATEGORY = "entry.222222";
const ENTRY_CONTENT = "entry.333333";

/* ===== カテゴリ分類 ===== */
function classify(text){

  if(text.includes("駅") || text.includes("交通")) return "インフラ";
  if(text.includes("教育")) return "教育";
  if(text.includes("公園")) return "環境";
  if(text.includes("AI") || text.includes("デジタル")) return "DX";

  return "一般";
}

/* ===== submit（AI＋送信） ===== */
async function submitIdea(){

  const text = document.getElementById("ideaInput").value;
  if(!text) return;

  const summary = text.length > 80 ? text.slice(0,80)+"..." : text;

  document.getElementById("aiResult").innerText = summary;

  const formData = new FormData();
  formData.append(ENTRY_TITLE, summary);
  formData.append(ENTRY_CATEGORY, classify(text));
  formData.append(ENTRY_CONTENT, text);

  fetch(GOOGLE_FORM_URL,{
    method:"POST",
    mode:"no-cors",
    body:formData
  });

  document.getElementById("ideaInput").value = "";
}

/* ===== 重複排除 ===== */
function deduplicate(data){

  const seen = new Set();

  return data.filter(d=>{
    const key = (d["タイトル"]||"") + (d["内容"]||"");
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

/* ===== ツリー更新 ===== */
function updateTree(data){

  const map = {};

  data.forEach(d=>{
    const c = d["カテゴリ"] || "一般";
    map[c] = (map[c]||0)+1;
  });

  document.getElementById("treeRoot").innerHTML =
    "芦屋市の未来<br><br>" +
    Object.entries(map).map(([k,v])=>`${k}：${v}`).join("<br>");
}

/* ===== データ取得 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwcN5Wbzbp8nZSV2GMvbMpXCWe9k8C5ToBN_P57kC1Dab4VZ-ib7Uim_SPct9XBzrEujg/exec";

async function loadData(){

  const res = await fetch(API_URL);
  let data = await res.json();

  data = deduplicate(data);

  document.getElementById("data").innerHTML = data.map(d=>`
    <div class="card">
      <div class="title">${d["タイトル"]}</div>
      <div class="cat">📂 ${d["カテゴリ"]}</div>
      <div class="body">${d["内容"]}</div>
    </div>
  `).join("");

  updateTree(data);
}

loadData();

</script>

</body>
</html>
