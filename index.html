<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話AIプラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="topbar">
  <div>🏛 市民対話AIプラットフォーム</div>
  <div class="status">LIVE DEMO</div>
</header>

<div class="layout">

  <!-- 左：ツリー -->
  <aside class="panel tree">
    <h3>政策ロジックツリー</h3>
    <div id="treeView"></div>
  </aside>

  <!-- 中央：投稿 -->
  <main class="panel center">
    <h3>市民投稿</h3>
    <div id="posts"></div>

    <div class="inputBox">
      <textarea id="input" placeholder="市民意見を入力"></textarea>
      <button id="btn">AI解析</button>
    </div>
  </main>

  <!-- 右：AI -->
  <aside class="panel ai">
    <h3>AI分析</h3>
    <div id="aiPanel">待機中</div>

    <h3>政策ドラフト</h3>
    <div id="policyPanel"></div>
  </aside>

</div>

<script src="./app.js"></script>
</body>
</html>
