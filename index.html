<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策プラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- イントロ -->
<div id="introScreen" class="screen">

  <h1>市民対話プラットフォーム</h1>

  <p>
    市民の意見をロジックツリーで構造化し、政策へ変換する実証システムです。
  </p>

  <button onclick="goMain()">開始</button>

</div>

<!-- ナビ -->
<div class="topbar hidden" id="topbar">
  <button onclick="switchView('tree')">ロジックツリー</button>
  <button onclick="switchView('posts')">投稿</button>
  <button onclick="switchView('pr')">Pull Request</button>
  <button onclick="switchView('analysis')">分析</button>
  <button onclick="switchView('merge')">統合</button>
</div>

<!-- メイン -->
<div id="app" class="hidden">

  <!-- ロジックツリー -->
  <div id="treeView" class="view">

    <pre id="treeBox" class="treeBox"></pre>

  </div>

  <!-- 投稿 -->
  <div id="postsView" class="view hidden">

    <h2>投稿</h2>

    <div class="treeClickHint">
      ※ロジックツリー項目をクリックして投稿テーマを選択
    </div>

    <div id="posts"></div>

    <textarea id="input"></textarea>
    <button id="btn">投稿</button>

    <div id="selectedTheme"></div>

  </div>

  <!-- PR -->
  <div id="prView" class="view hidden">
    <h2>Pull Request</h2>
    <p>市民意見の統合候補（v0.2構造）</p>
  </div>

  <!-- 分析 -->
  <div id="analysisView" class="view hidden">
    <h2>分析</h2>
    <p>意見の分類・影響分析・要約（AI統合予定）</p>
  </div>

  <!-- 統合 -->
  <div id="mergeView" class="view hidden">
    <h2>統合</h2>
    <p>複数意見の統合・政策ドラフト生成</p>
  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
