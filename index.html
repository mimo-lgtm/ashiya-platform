<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話プラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- イントロ -->
<div id="introScreen" style="padding:20px;">
  <h1>市民対話AIプラットフォーム</h1>

  <p>
    市民の意見を整理し、政策テーマへ変換する実証プラットフォームです。<br><br>

    まずロジックツリーで他の市民意見を確認してください。<br>
    その後、自分の意見を投稿できます。
  </p>

  <button id="startBtn">ロジックツリーを見る</button>
</div>

<!-- メイン -->
<div id="mainScreen" style="display:none;">

  <header class="header">
    駅前公共施設 市民対話プラットフォーム
  </header>

  <div class="container">

    <div class="tree"></div>

    <div class="posts"></div>

  </div>

  <div class="post-area">
    <textarea id="input" placeholder="意見を入力"></textarea>
    <button id="btn">投稿</button>
  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
