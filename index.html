<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市民政策AIプラットフォーム</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>

<body>

<header class="topbar">
  <div class="logo">🏛 市民政策AIプラットフォーム</div>

  <nav>
    <button onclick="showPage('intro')">ホーム</button>
    <button onclick="showPage('tree')">ロジックツリー</button>
    <button onclick="showPage('assistant')">AI壁打ち</button>
    <button onclick="showPage('rules')">分析ルール</button>
    <button onclick="showPage('pullrequest')">PULL REQUEST</button>
    <button onclick="showPage('vision')">ビジョン</button>
  </nav>
</header>

<main>

<!-- 19 INTRO -->
<section id="intro" class="page active">
  <div class="placeholder-card">
    <h1>駅前公共施設AIプラットフォーム</h1>
  </div>
</section>

<!-- 20 TREE -->
<section id="tree" class="page">

  <div class="placeholder-card">
    <h1>ロジックツリー</h1>
  </div>

  <!-- 23 TREE ROOT -->
  <div class="placeholder-card">
    <h2>市民政策構造</h2>

    <ul>
      <li>① 芦屋市の価値向上</li>
      <li>② 市民ベネフィット</li>
      <li>③ 財政持続性</li>
      <li>④ 戦略性</li>
      <li>⑤ 都市強靭性</li>
    </ul>
  </div>

</section>

<!-- 25 AI -->
<section id="assistant" class="page">

  <div class="placeholder-card">

    <h1>AI壁打ち</h1>

    <!-- CATEGORY（追加要件対応） -->
    <div class="category-bar">
      <button onclick="setCat('価値向上')">価値向上</button>
      <button onclick="setCat('市民ベネフィット')">ベネフィット</button>
      <button onclick="setCat('財政持続性')">財政</button>
      <button onclick="setCat('戦略性')">戦略</button>
      <button onclick="setCat('都市強靭性')">強靭性</button>
    </div>

    <textarea id="input" placeholder="あなたの考えをきかせてください"></textarea>

    <button onclick="runAI()" class="big-button">
      AI実行
    </button>

  </div>

  <div id="aiBox" class="placeholder-card">
    結果表示エリア
  </div>

</section>

<!-- 26 RULES -->
<section id="rules" class="page">
  <div class="placeholder-card">
    <h1>分析ルール</h1>
  </div>
</section>

<!-- 27 PULL REQUEST -->
<section id="pullrequest" class="page">

  <div class="placeholder-card">
    <h1>PULL REQUEST</h1>
  </div>

  <div id="data"></div>

</section>

<!-- 29 VISION -->
<section id="vision" class="page">

  <div class="placeholder-card">
    <h1>VISION</h1>
  </div>

</section>

</main>

</body>
</html>
