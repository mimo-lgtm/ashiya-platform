<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>駅前公共施設のありかた 市民との対話</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
駅前公共施設のありかた 市民との対話プラットフォーム
</header>

<nav>
<button onclick="show('intro')">イントロ</button>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('post')">AI壁打ち</button>
<button onclick="show('pr')">PR</button>
<button onclick="show('analysis')">分析</button>
</nav>

<!-- INTRO -->
<div id="intro" class="page active">
<div class="card">

<h2>このプラットフォームについて</h2>

<p>
市民が駅前公共施設について自由に意見を投稿できる仕組みです。<br><br>

従来は意見投稿の心理的ハードルが高かったが、
本システムでは思いつきレベルの意見をそのまま政策化できます。
</p>

</div>

<div class="card">
✔ 思いつき投稿OK<br>
✔ AIが要約・構造化<br>
✔ ロジックツリーで可視化<br>
✔ PR履歴で透明化<br>
✔ 政策統合プロセス公開
</div>

<div class="card">
<h3>4ステップ</h3>
① 市民意見 → ② AI構造化 → ③ ロジックツリー → ④ 政策化
</div>

<button class="btn" onclick="show('tree')">
ロジックツリーを見る
</button>

</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">
<h3>市民政策ロジックツリー（Vision）</h3>

<div id="treeBox"></div>

</div>
</div>

<!-- POST -->
<div id="post" class="page">
<div class="card">

<textarea id="input" placeholder="意見を入力してください"></textarea>

<button class="btn" onclick="runAI()">AI壁打ち（Groq）</button>

<div id="result"></div>

</div>
</div>

<!-- PR -->
<div id="pr" class="page">
<div class="card">
<h3>Pull Request（市民意見）</h3>
<div id="prBox"></div>
</div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="page">
<div class="card">
<h3>分析</h3>
<div id="analysisBox"></div>
</div>
</div>

<script src="./app.js"></script>

</body>
</html>
