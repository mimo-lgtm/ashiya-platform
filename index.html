<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>市民政策ロジックツリー（政策ユニット版）</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f5f5f5;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.unit {
  border: 1px solid #ddd;
  background: #fafafa;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 10px;
}

.title {
  font-weight: bold;
  color: #1a73e8;
}

.small {
  font-size: 12px;
  color: #666;
}

.item {
  margin-left: 10px;
  cursor: pointer;
}

#detail {
  white-space: pre-wrap;
  background: white;
  padding: 12px;
  border-left: 5px solid #2196f3;
}
</style>
</head>

<body>

<h1>市民政策ロジックツリー（政策ユニット版）</h1>

<div style="margin-bottom:15px;">
  <a href="post.html">👉 市民提案はこちら（投稿）</a>
</div>

<div class="box">
  <h3>政策ユニット（AI統合）</h3>
  <div id="units"></div>
</div>

<div class="box">
  <h3>詳細</h3>
  <div id="detail">クリックしてください</div>
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// 意味ベース統合キー（ここが重要）
function unitKey(t){

  if(t.includes("学生") || t.includes("若者") || t.includes("人口") || t.includes("移住"))
    return "人口・定住戦略ユニット";

  if(t.includes("図書館") || t.includes("教育"))
    return "教育・文化ユニット";

  if(t.includes("カフェ") || t.includes("交流") || t.includes("駅前"))
    return "交流拠点ユニット";

  if(t.includes("起業") || t.includes("スタートアップ"))
    return "産業・起業ユニット";

  if(t.includes("公園") || t.includes("緑"))
    return "都市環境ユニット";

  return "その他ユニット";
}

// ユニット化
function group(){
  let map = {};

  posts.forEach(p=>{
    let k = unitKey(p.title);

    if(!map[k]) map[k] = [];
    map[k].push(p);
  });

  return map;
}

// 表示
function render(){

  let map = group();
  let html = "";

  for(let k in map){

    html += `
      <div class="unit">
        <div class="title">${k}（${map[k].length}件）</div>
        <div class="small">統合された政策候補</div>
    `;

    map[k].forEach(p=>{
      html += `
        <div class="item" onclick="show('${p.title}','${p.summary}')">
          ・${p.title}
        </div>
      `;
    });

    html += `</div>`;
  }

  document.getElementById("units").innerHTML = html;
}

// 詳細
function show(t,s){
  document.getElementById("detail").innerText =
`■提案
${t}

■AI要約
${s}`;
}

render();

</script>

</body>
</html>
