<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>市民政策ロジックツリー</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f8;
}

h1 {
  margin-bottom: 10px;
}

a {
  color: #1a73e8;
  text-decoration: none;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.unit {
  background: #ffffff;
  border-left: 5px solid #1a73e8;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
}

.item {
  margin-left: 10px;
  cursor: pointer;
  padding: 4px;
}

.item:hover {
  background: #f0f7ff;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  background: #e8f0fe;
  color: #1a73e8;
}

.score {
  float: right;
  background: #e6f4ea;
  color: #137333;
  padding: 2px 6px;
  border-radius: 10px;
  font-size: 12px;
}

#detail {
  white-space: pre-wrap;
  background: white;
  padding: 12px;
  border-left: 5px solid #2196f3;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>市民政策ロジックツリー</h1>

<div style="margin-bottom:15px;">
  <a href="post.html">＋ 市民提案はこちら</a>
</div>

<div class="container">

  <div class="card">
    <div class="section-title">政策ユニット</div>
    <div id="units"></div>
  </div>

  <div class="card">
    <div class="section-title">政策マップ</div>
    <div id="map"></div>
  </div>

  <div class="card">
    <div class="section-title">優先順位</div>
    <div id="rank"></div>
  </div>

  <div class="card">
    <div class="section-title">詳細</div>
    <div id="detail">クリックしてください</div>
  </div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// 分類
function unit(t){
  if(t.includes("人口")||t.includes("学生")||t.includes("移住"))
    return "広域・人口戦略";

  if(t.includes("図書館")||t.includes("教育")||t.includes("絵本"))
    return "教育・文化";

  if(t.includes("カフェ")||t.includes("交流"))
    return "交流・滞在空間";

  if(t.includes("起業"))
    return "産業・起業";

  if(t.includes("公園")||t.includes("緑"))
    return "都市環境";

  return "その他";
}

// スコア
function score(t){
  let s = 50;
  if(t.includes("人口")||t.includes("移住")) s += 25;
  if(t.includes("図書館")) s += 15;
  if(t.includes("カフェ")) s += 10;
  if(t.includes("駅前")) s += 10;
  return Math.min(100,s);
}

// ユニット化
function group(){
  let map = {};
  posts.forEach(p=>{
    let u = unit(p.title);
    if(!map[u]) map[u]=[];
    map[u].push(p);
  });
  return map;
}

// 表示
function renderUnits(){
  let map = group();
  let html = "";

  for(let u in map){

    html += `<div class="unit">
      <span class="badge">${u}</span>
      <div style="margin-top:6px;">`;

    map[u].forEach(p=>{
      html += `
        <div class="item" onclick="show('${p.title}','${p.summary}')">
          ・${p.title}
        </div>
      `;
    });

    html += `</div></div>`;
  }

  document.getElementById("units").innerHTML = html;
}

// マップ
function renderMap(){
  let map = group();
  let html = "";

  for(let k in map){
    html += `<div class="unit">
      <span class="badge">${k}</span>
      <span class="score">${map[k].length}件</span>
    </div>`;
  }

  document.getElementById("map").innerHTML = html;
}

// ランキング
function renderRank(){
  let ranked = [...posts].sort((a,b)=>
    score(b.title)-score(a.title)
  );

  let html = "";

  ranked.slice(0,5).forEach((p,i)=>{
    html += `
      <div class="unit">
        <span class="badge">#${i+1}</span>
        ${p.title}
        <span class="score">${score(p.title)}</span>
      </div>
    `;
  });

  document.getElementById("rank").innerHTML = html;
}

// 詳細
function show(t,s){
  document.getElementById("detail").innerText =
`■提案
${t}

■AI要約
${s}`;
}

function render(){
  renderUnits();
  renderMap();
  renderRank();
}

render();

</script>

</body>
</html>
