<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話AIプラットフォーム（完成版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:"Yu Gothic",sans-serif;background:#f4f6f8;}
header{
background:linear-gradient(90deg,#1a73e8,#0f5bd3);
color:#fff;padding:18px;font-size:22px;font-weight:bold;
}

.sub{
background:#eef5ff;
padding:12px 16px;
font-size:14px;
line-height:1.6;
}

nav{
display:flex;gap:8px;
padding:10px;
background:#fff;
overflow:auto;
}

nav button{
padding:10px 12px;
border:none;
border-radius:8px;
background:#eef5ff;
cursor:pointer;
font-weight:bold;
}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
background:#fff;
padding:14px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.node{
padding:12px;
margin:6px 0;
border-left:5px solid #1a73e8;
background:#f8fbff;
cursor:pointer;
border-radius:8px;
}

.child{
display:none;
margin-left:15px;
padding:8px;
background:#fff;
border-left:3px solid #ccc;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:14px;
}

button.action{
width:100%;
padding:12px;
margin-top:8px;
border:none;
background:#1a73e8;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.tag{
display:inline-block;
background:#1a73e8;
color:#fff;
padding:3px 8px;
border-radius:20px;
font-size:12px;
}

.metric{
font-size:26px;
font-weight:bold;
color:#1a73e8;
}
</style>
</head>

<body>

<header>駅前公共施設 市民対話AIプラットフォーム</header>

<div class="sub">
市民の意見をAIが整理し、政策テーマへ変換する実証プラットフォーム
</div>

<nav>
<button onclick="show('home')">入口</button>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('post')">投稿</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('pr')">PR</button>
<button onclick="show('merge')">統合</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>あなたの意見を政策へ変換します</h2>
<p>ロジックツリーからテーマを選び投稿してください。</p>
<button class="action" onclick="show('tree')">開始</button>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">

<h3>市民政策ロジックツリー</h3>

<div class="node" onclick="selectTheme('価値向上')">① 芦屋市の価値向上</div>
<div class="node" onclick="selectTheme('市民ベネフィット')">② 市民ベネフィット</div>
<div class="node" onclick="selectTheme('財政')">③ 財政持続性</div>
<div class="node" onclick="selectTheme('施設')">④ 施設戦略</div>
<div class="node" onclick="selectTheme('ガバナンス')">⑤ ガバナンス</div>

</div>
</div>

<!-- POST -->
<div id="post" class="page">
<div class="card">

<h3>投稿＋AI分析</h3>

<div id="selected"></div>

<textarea id="input"></textarea>

<button class="action" onclick="addPost()">投稿</button>

<div id="result"></div>

<div id="postList"></div>

</div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="page">
<div class="card">
<h3>分析（投稿連動）</h3>
<div id="analysisBox"></div>
</div>
</div>

<!-- PR -->
<div id="pr" class="page">
<div class="card">
<h3>Pull Request（統合候補）</h3>
<div id="prBox"></div>
</div>
</div>

<!-- MERGE -->
<div id="merge" class="page">
<div class="card">
<h3>統合（政策ドラフト生成）</h3>
<div id="mergeBox"></div>
</div>
</div>

<script>

/* =========================
   状態管理（完全連動）
========================= */
let posts = [];
let currentTheme = "";

/* =========================
   画面切替
========================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="analysis") renderAnalysis();
if(id==="pr") renderPR();
if(id==="merge") renderMerge();
}

/* =========================
   テーマ選択 → 投稿へ
========================= */
function selectTheme(t){
currentTheme = t;
document.getElementById("selected").innerHTML =
`<div class="tag">選択中：${t}</div>`;
show("post");
}

/* =========================
   投稿 + AI処理
========================= */
function addPost(){

let text = document.getElementById("input").value.trim();
if(!text) return;

let post = {
text,
theme: currentTheme || "未分類",
category: classify(text),
summary: summarize(text),
question: question(text),
viewpoint: viewpoint(text)
};

posts.unshift(post);
document.getElementById("input").value="";

/* 全更新 */
renderPosts();
renderAnalysis();
renderPR();
}

/* =========================
   AIロジック（軽量v3統合）
========================= */
function classify(t){
if(t.includes("子ども")) return "子育て";
if(t.includes("教育")) return "教育";
if(t.includes("起業")) return "産業";
if(t.includes("防災")) return "防災";
return "総合";
}

function summarize(t){
return t.length>40 ? t.slice(0,40)+"..." : t;
}

function question(t){
return "この政策の優先順位は何ですか？";
}

function viewpoint(t){
return "都市ブランド戦略として再整理可能";
}

/* =========================
   投稿表示（連動核）
========================= */
function renderPosts(){

let html = posts.map(p=>`
<div class="card">
<div class="tag">${p.theme} / ${p.category}</div>
<p>${p.text}</p>
<p>要約：${p.summary}</p>
</div>
`).join("");

document.getElementById("postList").innerHTML =
html || "投稿なし";
}

/* =========================
   分析（完全連動）
========================= */
function renderAnalysis(){

let map = {};
posts.forEach(p=>{
map[p.category]=(map[p.category]||0)+1;
});

document.getElementById("analysisBox").innerHTML =
Object.entries(map).map(([k,v])=>
`<div class="card">${k}：${v}件</div>`
).join("") || "データなし";
}

/* =========================
   PR（統合候補）
========================= */
function renderPR(){

document.getElementById("prBox").innerHTML =
posts.map(p=>`
<div class="card">
<b>${p.theme}</b><br>
${p.summary}
</div>
`).join("") || "PRなし";
}

/* =========================
   統合（政策ドラフト）
========================= */
function renderMerge(){

if(posts.length===0){
document.getElementById("mergeBox").innerHTML="投稿なし";
return;
}

let merged = posts.map(p=>p.text).join(" ");

document.getElementById("mergeBox").innerHTML=`
<div class="card">
<h4>政策ドラフト</h4>
<p>
${currentTheme} を中心に市民意見を統合し政策化します。
</p>
<p>${merged.slice(0,200)}...</p>
</div>
`;
}

/* 初期描画 */
renderPosts();

</script>

</body>
</html>
