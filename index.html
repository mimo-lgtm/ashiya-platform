<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>政策OS プロトタイプ</title>

<style>
body{font-family:"Yu Gothic";margin:0;background:#f4f6f8;}
header{background:#1a73e8;color:white;padding:18px;font-size:22px;font-weight:bold;}
nav{display:flex;gap:10px;padding:10px;background:white;}
nav button{padding:10px;border:none;border-radius:8px;background:#eef5ff;cursor:pointer;}
.page{display:none;padding:15px;}
.active{display:block;}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:12px;}
.node{padding:10px;border-left:5px solid #1a73e8;background:#f8fbff;margin:6px 0;}
.btn{padding:10px;width:100%;background:#1a73e8;color:white;border:none;border-radius:8px;margin-top:8px;}
</style>
</head>

<body>

<header>
政策OS（市民参加型AI統合プラットフォーム）
</header>

<nav>
<button onclick="show('home')">HOME</button>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('dialog')">AI壁打ち</button>
<button onclick="show('pr')">Pull Requests</button>
<button onclick="show('dashboard')">分析</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>市民の声を政策へ変換</h2>
<p>AIと連動した政策統合OS</p>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">
<h2>ロジックツリー</h2>

<div class="node" onclick="selectTheme('教育・都市ブランド')">① 教育・都市ブランド</div>
<div class="node" onclick="selectTheme('市民交流')">② 市民交流</div>
<div class="node" onclick="selectTheme('都市防災')">③ 都市防災</div>

</div>
</div>

<!-- AI -->
<div id="dialog" class="page">
<div class="card">

<h2>AI壁打ち</h2>

<textarea id="input" style="width:100%;height:120px;"></textarea>

<button class="btn" onclick="runAI()">AI分析</button>

<div id="result"></div>

</div>
</div>

<!-- PR -->
<div id="pr" class="page">
<div class="card">
<h2>Pull Requests（市民投稿）</h2>
<div id="prList"></div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="card">
<h2>分析・統合コンセプト</h2>

<div id="concept"></div>

<div id="report"></div>

</div>
</div>

<script>

let API_KEY = "あなたの行政APIキー"; // ←行政キー入れるとAI化
let PRs = [];
let themes = {};

let currentTheme = "";

// -------------------- UI --------------------
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function selectTheme(t){
currentTheme = t;
show("dialog");
document.getElementById("input").value = t + "について意見";
}

// -------------------- AI CORE --------------------
async function runAI(){

let text = document.getElementById("input").value;
if(!text) return;

// ========== ダミーAI ==========
if(!API_KEY){

let result = {
summary:"（ダミー要約）" + text.slice(0,30),
title:"ダミー政策：" + currentTheme,
question:"どの観点を重視しますか？",
viewpoint:"統合には追加議論が必要",
category:currentTheme
};

return renderAI(result);
}

// ========== Gemini AI ==========
const prompt = `
あなたは自治体AI。
JSONで返す：

{
"summary":"",
"title":"",
"question":"",
"viewpoint":"",
"category":"",
"merge_suggestion":""
}

入力：
${text}
`;

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
}
);

const data = await res.json();

let raw = data.candidates?.[0]?.content?.parts?.[0]?.text;

let json;
try{ json = JSON.parse(raw); }
catch(e){
json = {summary:raw,title:"解析結果",question:"",viewpoint:"",category:""};
}

renderAI(json);
}

// -------------------- AI結果 --------------------
function renderAI(json){

document.getElementById("result").innerHTML = `
<div class="card">
<b>${json.title}</b>
<p>${json.summary}</p>

<button onclick="createPR('${json.title}','${json.summary}')"
class="btn">PR登録</button>
</div>
`;
}

// -------------------- PR SYSTEM --------------------
function createPR(title,text){

let pr = {
id:Date.now(),
title,
text,
status:"pending",
vote:0,
cluster:"未整理"
};

PRs.push(pr);

updatePR();
updateDashboard();
}

function updatePR(){

let html="";

PRs.forEach(p=>{
html += `
<div class="node">
<b>${p.title}</b><br>
${p.text}<br><br>

状態:${p.status} / 投票:${p.vote}<br>
分類:${p.cluster}<br>

<button onclick="vote(${p.id})">投票</button>
<button onclick="approve(${p.id})">承認</button>
</div>
`;
});

document.getElementById("prList").innerHTML =
html || "PRなし";
}

// -------------------- 投票 --------------------
function vote(id){

let p = PRs.find(x=>x.id===id);
p.vote++;

autoCluster(p);

updatePR();
updateDashboard();
}

// -------------------- 自動統合 --------------------
function autoCluster(pr){

if(pr.text.includes("教育") || pr.text.includes("子ども")){
pr.cluster = "教育系統合";
}
else if(pr.text.includes("防災")){
pr.cluster = "防災系統合";
}
else{
pr.cluster = "新規候補";
}
}

// -------------------- 承認 --------------------
function approve(id){

let p = PRs.find(x=>x.id===id);
p.status = "approved";

themes[p.title] = (themes[p.title]||0)+1;

updatePR();
updateDashboard();
}

// -------------------- ダッシュボード --------------------
function updateDashboard(){

// コンセプト進化
let concept = `
<b>統合コンセプト（AI生成）</b><br><br>
・教育×都市ブランドの統合強化<br>
・市民交流の拡張<br>
・未整理領域の増加 → 新カテゴリ生成フェーズ
`;

document.getElementById("concept").innerHTML = concept;

// レポート生成
let total = Object.values(themes).reduce((a,b)=>a+b,0);

document.getElementById("report").innerHTML = `
<hr>
<b>行政レポート</b><br>
総PR数：${PRs.length}<br>
承認数：${total}<br>
未処理：${PRs.filter(p=>p.status==="pending").length}
`;
}

</script>

</body>
</html>
