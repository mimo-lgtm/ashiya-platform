<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>駅前公共施設 市民対話プラットフォーム v4</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:"Yu Gothic",sans-serif;
background:#f4f6f8;
color:#222;
}

header{
background:linear-gradient(90deg,#1a73e8,#0f5bd3);
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.subheader{
padding:12px 20px;
background:#eef5ff;
font-size:15px;
line-height:1.8;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:white;
overflow:auto;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

nav button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#eef5ff;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.hero{font-size:20px;font-weight:bold;line-height:1.7;margin-bottom:15px;}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1a73e8;
color:white;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.node{
padding:14px;
margin:10px 0;
background:#f8fbff;
border-left:6px solid #1a73e8;
border-radius:10px;
cursor:pointer;
}

.child{
display:none;
margin-left:20px;
padding:12px;
background:white;
border-left:3px solid #ccc;
line-height:1.8;
}

textarea{
width:100%;
height:180px;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

.post{
background:#f5f8ff;
padding:15px;
border-radius:10px;
margin-top:12px;
}

.tag{
display:inline-block;
background:#1a73e8;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.metric{
font-size:32px;
font-weight:bold;
color:#1a73e8;
}
</style>

</head>

<body>

<header>
駅前公共施設 市民対話プラットフォーム
</header>

<div class="subheader">
市民の声をAIとの対話によって整理し、政策テーマへ変換する実証プラットフォーム
</div>

<nav>
<button onclick="showPage('home')">入口</button>
<button onclick="showPage('tree')">ロジックツリー</button>
<button onclick="showPage('dialog')">AI壁打ち</button>
<button onclick="showPage('dashboard')">政策テーマ</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<div class="hero">
あなたの意見を政策アイデアへ育てます
</div>
<button class="btn" onclick="showPage('tree')">
ロジックツリーを見る
</button>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">

<h2>ロジックツリー</h2>

<div class="node" onclick="toggle('a');selectTheme('芦屋市の価値向上')">
① 芦屋市の価値向上
</div>
<div id="a" class="child">教育・景観・ブランド</div>

<div class="node" onclick="toggle('b');selectTheme('市民へのベネフィット')">
② 市民へのベネフィット
</div>
<div id="b" class="child">交流・学習・福祉</div>

<div class="node" onclick="toggle('c');selectTheme('財政的持続可能性')">
③ 財政的持続可能性
</div>
<div id="c" class="child">収益化・ふるさと納税</div>

<button class="btn" onclick="showPage('dialog')">
意見を投稿
</button>

</div>
</div>

<!-- DIALOG -->
<div id="dialog" class="page">
<div class="card">

<h2>AI壁打ち</h2>

<textarea id="input"></textarea>

<button class="btn" onclick="runAI()">AIと対話</button>

<div id="result"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="card">

<h2>政策テーマ一覧</h2>

<div id="themeList"></div>

<h3>投稿数</h3>
<div class="metric" id="postCount">0</div>

</div>
</div>

<script>

let themes = {};
let currentTitle = "";
let selectedTheme = "";

// ★★★ Gemini AI連動 ★★★
async function runAI(){

let text = document.getElementById("input").value.trim();
if(text==="") return;

// ★ここに行政APIキーを入れる
const API_KEY = "YOUR_API_KEY_HERE";

const prompt = `
あなたは自治体向け政策AIです。
以下をJSONで出力：

{
"summary":"",
"title":"",
"question":"",
"viewpoint":"",
"category":""
}

入力：
${text}
`;

try{

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}
);

const data = await res.json();

let raw = data.candidates?.[0]?.content?.parts?.[0]?.text;

let json;
try{ json = JSON.parse(raw); }
catch(e){
json = {
summary: raw,
title:"解析結果",
question:"",
viewpoint:"",
category:""
};
}

currentTitle = json.title;

document.getElementById("result").innerHTML = `
<div class="post">

<div class="tag">AI要約</div>
<p>${json.summary}</p>

<div class="tag">政策テーマ</div>
<p><b>${json.title}</b></p>

<div class="tag">問い返し</div>
<p>${json.question}</p>

<div class="tag">追加視点</div>
<p>${json.viewpoint}</p>

<button class="btn" onclick="approveIdea()">
登録する
</button>

</div>
`;

}catch(e){
document.getElementById("result").innerHTML = `<div class="post">エラー:${e.message}</div>`;
}

}

// 登録
function approveIdea(){

if(!themes[currentTitle]) themes[currentTitle]=0;
themes[currentTitle]++;

updateDashboard();

alert("登録完了：" + currentTitle);
}

// ダッシュボード更新
function updateDashboard(){

let html="";
let total=0;

for(let t in themes){
total += themes[t];
html += `<div class="node">${t} : ${themes[t]}件</div>`;
}

document.getElementById("themeList").innerHTML =
html || "<div class='node'>まだ投稿なし</div>";

document.getElementById("postCount").innerText = total;
}

// UI
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function selectTheme(t){
selectedTheme=t;
showPage("dialog");
document.getElementById("input").value=t+"について意見";
}

</script>

</body>
</html>
