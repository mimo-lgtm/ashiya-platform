<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>市民政策AIプラットフォーム</title>

<style>
/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Yu Gothic","Meiryo",sans-serif;
  background:linear-gradient(135deg,#edf4ff,#f7fffb,#fff8ef);
  color:#1e293b;
}

.page{display:none;padding:40px 20px;}
.page.active{display:block}

/* ================= HEADER ================= */
header{
  position:sticky;
  top:0;
  background:#0f172a;
  padding:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

header button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
  font-weight:700;
}

/* ================= CARD ================= */
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin:15px 0;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* ================= TREE ================= */
.tree-item{
  padding:12px;
  margin:8px 0;
  background:#f1f5f9;
  border-radius:10px;
  cursor:pointer;
}

.tree-item:hover{
  background:#dbeafe;
}
</style>
</head>

<body>

<header>
  <button onclick="showPage('intro')">ホーム</button>
  <button onclick="showPage('tree')">ロジックツリー</button>
  <button onclick="showPage('ai')">AI壁打ち</button>
  <button onclick="showPage('pr')">PR</button>
  <button onclick="showPage('vision')">ビジョン</button>
</header>

<main>

<!-- ================= INTRO ================= -->
<section id="intro" class="page active">
  <div class="card">
    <h1>駅前公共施設 市民政策プラットフォーム</h1>
    <p>市民意見をAIで整理し政策化するシステム</p>
  </div>
</section>

<!-- ================= TREE ================= -->
<section id="tree" class="page">
  <div class="card">
    <h1>ロジックツリー</h1>
    <div id="treeBox"></div>
  </div>
</section>

<!-- ================= AI ================= -->
<section id="ai" class="page">
  <div class="card">
    <h1>AI壁打ち</h1>

    <textarea id="aiInput" style="width:100%;height:140px;"></textarea>

    <select id="aiCategory">
      <option>価値向上</option>
      <option>ベネフィット</option>
      <option>財政</option>
      <option>戦略</option>
      <option>強靭性</option>
    </select>

    <button onclick="aiRun()">AI実行</button>

    <div id="aiResult" class="card"></div>
  </div>
</section>

<!-- ================= PR ================= -->
<section id="pr" class="page">
  <div class="card">
    <h1>PULL REQUEST</h1>
    <div id="prBox"></div>
  </div>
</section>

<!-- ================= VISION ================= -->
<section id="vision" class="page">
  <div class="card">
    <h1>ビジョン</h1>
    <div id="visionBox"></div>
  </div>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
