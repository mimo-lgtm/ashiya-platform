<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策AI（安定プロダクション版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:"Yu Gothic",sans-serif;background:#f4f6f8;}
header{
background:linear-gradient(90deg,#1a73e8,#0f5bd3);
color:#fff;padding:18px;font-size:22px;font-weight:bold;
}
nav{display:flex;gap:8px;padding:10px;background:#fff;overflow:auto;}
nav button{padding:10px;border:none;background:#eef5ff;border-radius:8px;font-weight:bold;cursor:pointer;}
.page{display:none;padding:15px;}
.active{display:block;}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:10px;}
textarea{width:100%;height:120px;padding:10px;}
button{width:100%;padding:12px;background:#1a73e8;color:#fff;border:none;border-radius:8px;margin-top:8px;}
.tag{display:inline-block;background:#1a73e8;color:#fff;padding:3px 8px;border-radius:20px;font-size:12px;}
.error{background:#ffe5e5;color:#900;padding:10px;border-radius:8px;}
</style>

<script>
window.GROQ_API_KEY = "gsk_xxxxx";
</script>

</head>

<body>

<header>市民政策AI（安定版）</header>

<nav>
<button onclick="show('post')">投稿</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('merge')">統合</button>
</nav>

<!-- POST -->
<div id="post" class="page active">
<div class="card">
<h3>AI投稿</h3>

<textarea id="input"></textarea>

<button onclick="runAI()">AI分析（安定版）</button>

<div id="out"></div>
</div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="page">
<div class="card">
<h3>分析</h3>
<div id="analysisBox"></div>
</div>
</div>

<!-- MERGE -->
<div id="merge" class="page">
<div class="card">
<h3>統合</h3>
<div id="mergeBox"></div>
</div>
</div>

<script>

let posts = [];

/* =========================
   画面制御
========================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="analysis") renderAnalysis();
if(id==="merge") renderMerge();
}

/* =========================
   🔥 SAFE GROQ CALL
   （絶対に落ちない設計）
========================= */
async function callGroq(text){

try{

const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + window.GROQ_API_KEY
},
body:JSON.stringify({
model:"llama-3.1-70b-versatile",
messages:[
{
role:"system",
content:`あなたは行政AI。必ずJSONで返す：
{"category":"","summary":"","question":"","viewpoint":"","title":""}`
},
{role:"user",content:text}
],
temperature:0.3
})
});

const data = await res.json();

let raw = data?.choices?.[0]?.message?.content || "";

/* 🔥 JSON安全化（最重要） */
raw = raw.replace(/```json/g,"").replace(/```/g,"").trim();

/* パース保護 */
let json;

try {
json = JSON.parse(raw);
} catch(e) {

/* fallback（AIが壊れた場合） */
json = fallbackAI(text);

}

return json;

} catch(e){

/* API完全失敗時 */
return fallbackAI(text);

}
}

/* =========================
   フォールバックAI（重要）
========================= */
function fallbackAI(text){

return {
category: classify(text),
summary: text.slice(0,40),
question:"この施策の目的は何ですか？",
viewpoint:"AI応答が不安定なため簡易解析",
title:"暫定政策案"
};
}

/* =========================
   簡易分類（ローカル保険）
========================= */
function classify(t){
if(t.includes("子ども")) return "子育て";
if(t.includes("教育")) return "教育";
if(t.includes("防災")) return "防災";
if(t.includes("起業")) return "産業";
return "総合";
}

/* =========================
   投稿処理
========================= */
async function runAI(){

let text = document.getElementById("input").value.trim();
if(!text) return;

document.getElementById("out").innerHTML="AI解析中...";

let ai = await callGroq(text);

posts.unshift({text,...ai});

document.getElementById("input").value="";

renderAll();

document.getElementById("out").innerHTML=`
<div class="card">
<div class="tag">${ai.category}</div>
<h3>${ai.title}</h3>
<p>${ai.summary}</p>
<p>${ai.question}</p>
<p>${ai.viewpoint}</p>
</div>`;
}

/* =========================
   分析
========================= */
function renderAnalysis(){

let map={};
posts.forEach(p=>{
map[p.category]=(map[p.category]||0)+1;
});

document.getElementById("analysisBox").innerHTML =
Object.entries(map).map(([k,v])=>
`<div class="card">${k}：${v}件</div>`
).join("") || "データなし";
}

/* =========================
   統合
========================= */
function renderMerge(){

if(posts.length===0){
document.getElementById("mergeBox")="なし";
return;
}

let merged = posts.map(p=>p.summary).join(" ");

document.getElementById("mergeBox").innerHTML=`
<div class="card">
<h3>政策ドラフト</h3>
<p>${merged}</p>
</div>`;
}

/* 全更新 */
function renderAll(){
renderAnalysis();
renderMerge();
}

</script>

</body>
</html>
