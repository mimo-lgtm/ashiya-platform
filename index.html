<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策AI（安定UI最終版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:"Yu Gothic",sans-serif;
background:#f4f6f8;
color:#222;
}

header{
background:linear-gradient(90deg,#1a73e8,#0f5bd3);
color:#fff;
padding:18px;
font-size:22px;
font-weight:bold;
}

/* 重要：display制御を完全JSに統一 */
.page{
display:none;
padding:15px;
}

.card{
background:#fff;
padding:16px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

nav{
display:flex;
gap:8px;
padding:10px;
background:#fff;
overflow:auto;
position:sticky;
top:0;
}

nav button{
padding:10px 12px;
border:none;
border-radius:8px;
background:#eef5ff;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.node{
padding:12px;
margin:8px 0;
border-left:5px solid #1a73e8;
background:#f8fbff;
border-radius:8px;
cursor:pointer;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:14px;
border-radius:8px;
border:1px solid #ccc;
}

button.action{
width:100%;
padding:12px;
background:#1a73e8;
color:#fff;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.tag{
display:inline-block;
background:#1a73e8;
color:#fff;
padding:3px 8px;
border-radius:20px;
font-size:12px;
}

</style>
</head>

<body>

<header>市民政策AIプラットフォーム（安定最終版）</header>

<nav>
<button onclick="show('intro')">イントロ</button>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('post')">投稿</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('merge')">統合</button>
</nav>

<!-- ================= INTRO ================= -->
<div id="intro" class="page">
<div class="card">

<h2>市民の意見を政策に変換するAIプラットフォーム</h2>

<p>
このシステムは、市民の思いつきレベルの意見を
AIが構造化し、政策へ変換する実証プロジェクトです。
</p>

<hr>

<div class="card">🧠 思いつき投稿 → OK（専門知識不要）</div>
<div class="card">🤖 AIが自動で要約・構造化</div>
<div class="card">🔍 政策化プロセスを可視化</div>
<div class="card">🌳 ロジックツリーで構造表示</div>
<div class="card">📊 分析・傾向の可視化</div>
<div class="card">🔄 政策統合プロセス公開</div>

<hr>

<div class="card">
<b>4ステップ</b><br><br>
① 市民意見<br>
↓<br>
② AI構造化<br>
↓<br>
③ ロジックツリー統合<br>
↓<br>
④ 政策化
</div>

<button class="action" onclick="show('tree')">
ロジックツリーを見る
</button>

</div>
</div>

<!-- ================= TREE ================= -->
<div id="tree" class="page">
<div class="card">

<h3>ロジックツリー</h3>

<div class="node" onclick="selectTheme('価値向上')">① 価値向上</div>
<div class="node" onclick="selectTheme('市民ベネフィット')">② 市民ベネフィット</div>
<div class="node" onclick="selectTheme('財政')">③ 財政</div>
<div class="node" onclick="selectTheme('施設')">④ 施設</div>
<div class="node" onclick="selectTheme('ガバナンス')">⑤ ガバナンス</div>

</div>
</div>

<!-- ================= POST ================= -->
<div id="post" class="page">
<div class="card">

<h3>投稿</h3>

<div id="selected"></div>

<textarea id="input"></textarea>

<button class="action" onclick="runAI()">AI分析</button>

<div id="out"></div>

</div>
</div>

<!-- ================= ANALYSIS ================= -->
<div id="analysis" class="page">
<div class="card">
<h3>分析</h3>
<div id="analysisBox"></div>
</div>
</div>

<!-- ================= MERGE ================= -->
<div id="merge" class="page">
<div class="card">
<h3>統合</h3>
<div id="mergeBox"></div>
</div>
</div>

<script>

let posts = [];
let currentTheme = "";

/* =========================
   ★ 超重要：初期表示固定
========================= */
window.addEventListener("DOMContentLoaded", () => {
  show("intro");
});

/* =========================
   ページ制御（完全固定）
========================= */
function show(id){

// 全消し
document.querySelectorAll(".page").forEach(p=>{
  p.style.display = "none";
});

// 表示
const target = document.getElementById(id);
if(target){
  target.style.display = "block";
}
}

/* =========================
   テーマ選択
========================= */
function selectTheme(t){
currentTheme = t;
document.getElementById("selected").innerHTML =
`<div class="tag">選択中：${t}</div>`;
show("post");
}

/* =========================
   ダミーAI（安定版）
========================= */
function simpleAI(text){

return {
category: text.includes("子ども") ? "子育て" :
text.includes("教育") ? "教育" :
text.includes("防災") ? "防災" : "総合",

title: text.slice(0,20),
summary: "AIが構造化した要約",
question: "この施策の優先順位は？",
viewpoint: "複数政策との統合可能性あり"
};
}

/* =========================
   投稿
========================= */
function runAI(){

let text = document.getElementById("input").value.trim();
if(!text) return;

let ai = simpleAI(text);

posts.unshift({text,...ai});

document.getElementById("input").value="";

renderAll();

document.getElementById("out").innerHTML=`
<div class="card">
<div class="tag">${ai.category}</div>
<h3>${ai.title}</h3>
<p>${ai.summary}</p>
<p>${ai.question}</p>
<p>${ai.viewpoint}</p>
</div>`;
}

/* =========================
   分析
========================= */
function renderAnalysis(){

let map={};
posts.forEach(p=>{
map[p.category]=(map[p.category]||0)+1;
});

document.getElementById("analysisBox").innerHTML =
Object.entries(map).map(([k,v])=>
`<div class="card">${k}：${v}件</div>`
).join("") || "なし";
}

/* =========================
   統合
========================= */
function renderMerge(){

if(posts.length===0){
document.getElementById("mergeBox").innerHTML="なし";
return;
}

document.getElementById("mergeBox").innerHTML=`
<div class="card">
${posts.map(p=>p.summary).join("<br><br>")}
</div>`;
}

function renderAll(){
renderAnalysis();
renderMerge();
}

</script>

</body>
</html>
