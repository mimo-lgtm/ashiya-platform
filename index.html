<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民対話AIプラットフォーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- イントロ画面 -->
<div id="introScreen" style="padding:20px;">
  <h1>市民対話AIプラットフォーム</h1>

  <p>
  市民の意見をAIとの対話によって整理し、政策テーマへ変換する実証プラットフォームです。<br><br>

  まずはロジックツリーで他の市民の意見を見てみましょう。<br>
  その中から興味のある意見を選び、自分の意見を投稿できます。<br><br>

  意見は整理されていなくても問題ありません。AIが構造化します。
  </p>

  <button id="startBtn">ロジックツリーを見る</button>
</div>

<!-- メイン画面 -->
<div id="mainScreen" style="display:none;">

  <header>
    駅前公共施設 市民対話プラットフォーム
  </header>

  <div class="container">

    <div class="tree"></div>

    <div id="posts"></div>

  </div>

  <div class="post-area">
    <textarea id="input" placeholder="意見を入力"></textarea>
    <button id="btn">投稿</button>
  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
