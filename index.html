<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>市民AI共創OS（進化型）</title>

<style>
body{font-family:Yu Gothic;margin:0;background:#f4f6f8;}
.top{background:#0a3a5a;color:white;padding:10px;display:flex;gap:8px;}
.top button{padding:8px 12px;border:none;border-radius:6px;background:white;color:#0a3a5a;cursor:pointer;}
.container{max-width:1000px;margin:auto;padding:16px;}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:12px;}
.block{border-left:5px solid #0a3a5a;padding:12px;margin:8px 0;background:#f9fbfd;cursor:pointer;}
.page{display:none;}
.active{display:block;}
textarea{width:100%;height:120px;}
.btn{background:#0a3a5a;color:white;padding:10px;border:none;border-radius:8px;margin-top:10px;cursor:pointer;}
.tag{background:#0a3a5a;color:white;padding:3px 8px;border-radius:20px;font-size:12px;display:inline-block;}
.small{font-size:13px;color:#666;}
</style>
</head>

<body>

<div class="top">
<button onclick="go('intro')">はじめに</button>
<button onclick="go('tree')">ツリー</button>
<button onclick="go('post')">投稿</button>
<button onclick="go('ai')">AI統合</button>
</div>

<div class="container">

<!-- INTRO -->
<div id="intro" class="page active">
<div class="card">
<h2>市民AI共創OS</h2>
<p>
あなたの意見がそのまま「駅前の構造」を変えていきます。
AIがそれを整理し、都市の形に変換します。
</p>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">
<h2>ロジックツリー（動的）</h2>
<div id="treeBox"></div>
</div>
</div>

<!-- POST -->
<div id="post" class="page">
<div class="card">
<h2>意見投稿</h2>
<textarea id="text"></textarea>
<button class="btn" onclick="submit()">送信</button>
</div>
</div>

<!-- AI -->
<div id="ai" class="page">
<div class="card">
<h2>AI統合結果</h2>
<div id="aiBox"></div>
</div>
</div>

</div>

<script>

let posts = [];
let clusters = {};

/* navigation */
function go(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* ===== AI（ダミー or Gemini接続） ===== */
async function analyze(text){

const API_KEY = "YOUR_API_KEY_HERE";

if(API_KEY==="YOUR_API_KEY_HERE"){
return {
tag: text.includes("教育") ? "教育" :
text.includes("起業") ? "起業" :
text.includes("交流") ? "交流" : "その他",
summary: "（ダミー）市民意見として整理されました"
};
}

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:"分類・要約:" + text}]}]
})
}
);

const data = await res.json();
let out = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

return {tag:"AI分類",summary:out};
}

/* ===== 投稿 ===== */
async function submit(){

let text = document.getElementById("text").value;
if(!text) return;

let ai = await analyze(text);

posts.push({text,ai});

/* clustering */
if(!clusters[ai.tag]) clusters[ai.tag]=[];
clusters[ai.tag].push(text);

go("ai");
}

/* ===== render ===== */
function render(){

/* TREE */
let treeHTML="";
for(let k in clusters){
treeHTML+=`
<div class="block">
<b>${k}</b><br>
${clusters[k].length}件の意見
</div>`;
}
document.getElementById("treeBox").innerHTML=
treeHTML || "<p>まだデータなし</p>";

/* AI */
let aiHTML="";
posts.slice(-5).forEach(p=>{
aiHTML+=`
<div class="card">
<div class="tag">${p.ai.tag}</div>
<p>${p.ai.summary}</p>
</div>`;
});
document.getElementById("aiBox").innerHTML=aiHTML;

}

</script>

</body>
</html>
