<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>市民政策AIプラットフォーム（行政提出版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:"Yu Gothic",sans-serif;background:#f4f6f8;}
header{
background:linear-gradient(90deg,#1a73e8,#0f5bd3);
color:#fff;padding:18px;font-size:22px;font-weight:bold;
}

nav{
display:flex;gap:8px;padding:10px;background:#fff;overflow:auto;
position:sticky;top:0;
}

nav button{
padding:10px 12px;
border:none;
border-radius:8px;
background:#eef5ff;
font-weight:bold;
cursor:pointer;
}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
background:#fff;
padding:14px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.node{
padding:12px;
margin:6px 0;
border-left:5px solid #1a73e8;
background:#f8fbff;
border-radius:8px;
cursor:pointer;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:14px;
}

button.action{
width:100%;
padding:12px;
background:#1a73e8;
color:#fff;
border:none;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

.tag{
display:inline-block;
background:#1a73e8;
color:#fff;
padding:3px 8px;
border-radius:20px;
font-size:12px;
}
</style>

<script>
window.GROQ_API_KEY = "gsk_xxxxx"; // ←ここだけ設定
</script>

</head>

<body>

<header>
駅前公共施設 市民政策AIプラットフォーム（行政提出版）
</header>

<nav>
<button onclick="show('intro')">イントロ</button>
<button onclick="show('tree')">ロジックツリー</button>
<button onclick="show('post')">投稿</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('pr')">PR</button>
<button onclick="show('merge')">統合</button>
</nav>

<!-- INTRO -->
<div id="intro" class="page active">
<div class="card">
<h2>市民意見 → 政策生成システム</h2>
<p>
市民の意見をAIが構造化し、
政策テーマ・統合案へ変換する実証プラットフォームです。
</p>
<button class="action" onclick="show('tree')">ロジックツリーへ</button>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">
<div class="card">

<h3>市民政策ロジックツリー</h3>

<div class="node" onclick="selectTheme('価値向上')">① 価値向上</div>
<div class="node" onclick="selectTheme('市民ベネフィット')">② 市民ベネフィット</div>
<div class="node" onclick="selectTheme('財政')">③ 財政</div>
<div class="node" onclick="selectTheme('施設')">④ 施設戦略</div>
<div class="node" onclick="selectTheme('ガバナンス')">⑤ ガバナンス</div>

</div>
</div>

<!-- POST -->
<div id="post" class="page">
<div class="card">

<h3>市民投稿</h3>

<div id="selected"></div>

<textarea id="input"></textarea>

<button class="action" onclick="runAI()">AI分析（Groq）</button>

<div id="out"></div>

</div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="page">
<div class="card">
<h3>分析ダッシュボード</h3>
<div id="analysisBox"></div>
</div>
</div>

<!-- PR -->
<div id="pr" class="page">
<div class="card">
<h3>Pull Request（統合候補）</h3>
<div id="prBox"></div>
</div>
</div>

<!-- MERGE -->
<div id="merge" class="page">
<div class="card">
<h3>政策統合（ドラフト生成）</h3>
<div id="mergeBox"></div>
</div>
</div>

<script>

let posts = [];
let currentTheme = "";

/* =========================
   画面制御
========================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="analysis") renderAnalysis();
if(id==="pr") renderPR();
if(id==="merge") renderMerge();
}

/* =========================
   テーマ選択
========================= */
function selectTheme(t){
currentTheme = t;
document.getElementById("selected").innerHTML =
`<div class="tag">選択中：${t}</div>`;
show("post");
}

/* =========================
   Groq API
========================= */
async function callGroq(text){

const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + window.GROQ_API_KEY
},
body:JSON.stringify({
model:"llama-3.1-70b-versatile",
messages:[
{
role:"system",
content:`あなたは日本の行政政策AI。
必ずJSONで返す：
{
"category":"",
"summary":"",
"question":"",
"viewpoint":"",
"title":""
}`
},
{role:"user",content:text}
],
temperature:0.3
})
});

const data = await res.json();
return JSON.parse(data.choices[0].message.content);
}

/* =========================
   投稿 + AI
========================= */
async function runAI(){

let text = document.getElementById("input").value.trim();
if(!text) return;

document.getElementById("out").innerHTML="AI解析中...";

let ai = await callGroq(text);

let post = {
text,
theme: currentTheme,
...ai
};

posts.unshift(post);

document.getElementById("input").value="";

renderAll();

document.getElementById("out").innerHTML=
`<div class="card">
<div class="tag">${ai.category}</div>
<h3>${ai.title}</h3>
<p>${ai.summary}</p>
<p>${ai.question}</p>
<p>${ai.viewpoint}</p>
</div>`;
}

/* =========================
   分析
========================= */
function renderAnalysis(){

let map = {};
posts.forEach(p=>{
map[p.category]=(map[p.category]||0)+1;
});

document.getElementById("analysisBox").innerHTML =
Object.entries(map).map(([k,v])=>
`<div class="card">${k}：${v}件</div>`
).join("") || "なし";
}

/* =========================
   PR
========================= */
function renderPR(){

document.getElementById("prBox").innerHTML =
posts.map(p=>`
<div class="card">
<b>${p.title}</b><br>
${p.summary}
</div>
`).join("") || "なし";
}

/* =========================
   統合
========================= */
function renderMerge(){

if(posts.length===0){
document.getElementById("mergeBox").innerHTML="なし";
return;
}

let merged = posts.map(p=>p.summary).join(" ");

document.getElementById("mergeBox").innerHTML=`
<div class="card">
<h3>政策ドラフト</h3>
<p>${merged}</p>
</div>`;
}

/* 全更新 */
function renderAll(){
renderAnalysis();
renderPR();
renderMerge();
}

</script>

</body>
</html>
