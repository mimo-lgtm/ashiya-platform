<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>駅前公共施設 市民対話プラットフォーム v4</title>

<style>
body{margin:0;font-family:"Yu Gothic",sans-serif;background:#f4f6f8;}
header{background:#1a73e8;color:#fff;padding:20px;font-size:26px;font-weight:bold;}
.subheader{padding:12px 20px;background:#eef5ff;}
nav{display:flex;gap:10px;padding:10px;background:#fff;}
nav button{padding:10px;border:none;background:#eef5ff;border-radius:8px;cursor:pointer;}
.page{display:none;padding:15px;}
.active{display:block;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
.node{padding:12px;margin:8px 0;background:#f8fbff;border-left:5px solid #1a73e8;cursor:pointer;}
.child{display:none;margin-left:20px;padding:10px;background:#fff;}
textarea{width:100%;height:140px;}
.btn{padding:12px;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:10px;}
.metric{font-size:28px;font-weight:bold;color:#1a73e8;}
.thread{border-left:3px solid #1a73e8;padding-left:10px;margin-top:10px;}
</style>
</head>

<body>

<header>駅前公共施設 市民対話プラットフォーム</header>

<div class="subheader">
市民の声をAIとの対話によって整理し政策テーマへ変換する実証プラットフォーム
</div>

<nav>
<button onclick="showPage('home')">入口</button>
<button onclick="showPage('tree')">ロジックツリー</button>
<button onclick="showPage('dialog')">AI壁打ち</button>
<button onclick="showPage('dashboard')">政策テーマ</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>あなたの意見を政策へ育てます</h2>
<button class="btn" onclick="showPage('tree')">ロジックツリーを見る</button>
</div>
</div>

<!-- TREE -->
<div id="tree" class="page">

<div class="card">

<h2>市民政策ロジックツリー（Vision）</h2>

<div class="node" onclick="toggle('a');selectTheme('価値向上')">
① 芦屋市の価値向上
</div>

<div id="a" class="child">
教育ブランド / 景観 / 公園
</div>

<div class="node" onclick="toggle('b');selectTheme('市民ベネフィット')">
② 市民ベネフィット
</div>

<div id="b" class="child">
交流 / カフェ / 学習
</div>

<div class="node" onclick="toggle('c');selectTheme('財政')">
③ 財政
</div>

<div id="c" class="child">
収益 / 寄付
</div>

<div class="node" onclick="toggle('d');selectTheme('施設')">
④ 施設
</div>

<div id="d" class="child">
拠点 / 起業
</div>

<div class="node" onclick="toggle('e');selectTheme('ガバナンス')">
⑤ ガバナンス
</div>

<div id="e" class="child">
防災 / DAO
</div>

<button class="btn" onclick="showPage('dialog')">
テーマについて投稿
</button>

</div>
</div>

<!-- DIALOG -->
<div id="dialog" class="page">
<div class="card">

<h2>AI壁打ち</h2>

<textarea id="input"></textarea>

<button class="btn" onclick="runAI()">AI分析</button>

<div id="result"></div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="card">

<h2>政策テーマ</h2>

<div id="themeList"></div>

<div class="metric" id="postCount">0</div>

</div>
</div>

<script>
let themes = {};
let selectedTheme = "";
let currentTitle = "";

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggle(id){
let el=document.getElementById(id);
el.style.display = (el.style.display==="block")?"none":"block";
}

function selectTheme(t){
selectedTheme=t;
showPage('dialog');
}

function runAI(){
let text=document.getElementById("input").value;

let title="政策案";
let summary=text;

currentTitle=title;

document.getElementById("result").innerHTML=
`<div class="card">${summary}</div>`;
}

function update(){
document.getElementById("themeList").innerHTML=
Object.keys(themes).map(t=>`<div class="node">${t}</div>`).join("");

document.getElementById("postCount").innerText=
Object.values(themes).reduce((a,b)=>a+b,0);
}

update();
</script>

</body>
</html>
