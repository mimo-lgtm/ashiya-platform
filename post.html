<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>市民提案投稿</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f5f5f5;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 8px;
}

textarea {
  width: 100%;
  height: 110px;
}

button {
  margin-top: 10px;
  padding: 10px;
}

#out {
  white-space: pre-wrap;
  margin-top: 10px;
  background: white;
  padding: 10px;
  border-left: 5px solid #2196f3;
}
</style>
</head>

<body>

<a href="index.html">← ロジックツリーへ戻る</a>

<h1>市民提案</h1>

<div class="box">
<textarea id="input" placeholder="例：駅前に図書館とカフェ"></textarea>
<button onclick="submit()">投稿</button>
</div>

<div id="out">待機中</div>

<script>

// 分類
function classify(t){
  if(t.includes("カフェ")||t.includes("交流")) return "交流・滞在空間";
  if(t.includes("図書館")||t.includes("教育")) return "学び・文化・教育";
  if(t.includes("公園")||t.includes("緑")) return "都市環境・景観";
  if(t.includes("起業")) return "産業・起業";
  if(t.includes("人口")||t.includes("移住")) return "広域戦略";
  return "その他";
}

// 投稿
function submit(){

  let t = document.getElementById("input").value;
  if(!t) return;

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  posts.push({
    title: t,
    summary: "AI要約（簡易）：都市価値・交流性向上の可能性あり",
    category: classify(t)
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("out").innerText =
`投稿完了

■分類
${classify(t)}`;
}

</script>

</body>
</html>
